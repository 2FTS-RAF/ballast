name: Add aircraft
description: Submit a new aircraft tail number and weight for the ballast calculator data file.
title: "Add aircraft: "
labels:
  - aircraft-submission
body:
  - type: markdown
    attributes:
      value: |
        Submit the aircraft details below and the repository automation will prepare a pull request to update `assets/aircraft_weights.csv`.
        Automatic merge only happens when the email address uses an approved MOD domain, the tail number matches `ZE` followed by three digits, and the weight is between `380` and `500` kg.

  - type: input
    id: aircraft_tail_number
    attributes:
      label: Aircraft tail number
      description: Use `ZE` followed by exactly three digits, for example `ZE123`.
      placeholder: ZE123
    validations:
      required: true

  - type: input
    id: aircraft_weight
    attributes:
      label: Aircraft weight (kg)
      description: Enter a numeric aircraft weight between 380 and 500 kilograms.
      placeholder: "416.25"
    validations:
      required: true

  - type: input
    id: submitter_email
    attributes:
      label: Submitter email
      description: Provide an approved RAFAC or MOD email address. This will be visible in the issue and any related pull request.
      placeholder: name@rafac.mod.gov.uk
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have checked the aircraft tail number and weight before submitting.
          required: true
