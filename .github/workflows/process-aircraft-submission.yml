name: Process aircraft submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-aircraft-submission:
    if: contains(join(github.event.issue.labels.*.name, ','), 'aircraft-submission')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Process issue into aircraft CSV
        id: process_issue
        continue-on-error: true
        run: node scripts/process-aircraft-issue.mjs
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          CSV_PATH: assets/aircraft_weights.csv

      - name: Comment on invalid submission
        if: steps.process_issue.outcome != 'success'
        uses: actions/github-script@v7
        env:
          ERROR_MESSAGE: ${{ steps.process_issue.outputs.error_message }}
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const reason = process.env.ERROR_MESSAGE || 'The submission could not be parsed.';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `The aircraft submission could not be processed automatically.\n\nReason: ${reason}\n\nPlease edit the issue and save it again, or update \`assets/aircraft_weights.csv\` manually.`
            });

      - name: Stop workflow after invalid submission
        if: steps.process_issue.outcome != 'success'
        run: exit 1

      - name: Comment when no CSV change is required
        if: steps.process_issue.outputs.change_action == 'no-change'
        uses: actions/github-script@v7
        env:
          AIRCRAFT: ${{ steps.process_issue.outputs.aircraft }}
          WEIGHT: ${{ steps.process_issue.outputs.weight }}
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const aircraft = process.env.AIRCRAFT;
            const weight = process.env.WEIGHT;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `No update was needed. \`${aircraft}\` is already recorded at \`${weight} kg\` in \`assets/aircraft_weights.csv\`.`
            });

      - name: Create pull request for aircraft data update
        id: create_pr
        if: steps.process_issue.outputs.change_action != 'no-change'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/add-aircraft-${{ github.event.issue.number }}
          delete-branch: true
          commit-message: Sync aircraft data from issue #${{ github.event.issue.number }}
          title: Sync aircraft ${{ steps.process_issue.outputs.aircraft }} from issue #${{ github.event.issue.number }}
          body: |
            Updates `assets/aircraft_weights.csv` from issue #${{ github.event.issue.number }}.

            Change type: `${{ steps.process_issue.outputs.change_action }}`
            Aircraft: `${{ steps.process_issue.outputs.aircraft }}`
            Weight: `${{ steps.process_issue.outputs.weight }} kg`
            Submitter email: `${{ steps.process_issue.outputs.submitter_email }}`

            Closes #${{ github.event.issue.number }}

      - name: Resolve automation pull request
        id: resolve_pr
        if: steps.process_issue.outputs.change_action != 'no-change'
        uses: actions/github-script@v9
        env:
          BRANCH_NAME: automation/add-aircraft-${{ github.event.issue.number }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = `${owner}:${process.env.BRANCH_NAME}`;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              head,
              state: 'open',
              per_page: 1,
            });
            const pr = pulls[0];

            if (!pr) {
              throw new Error(`No open pull request found for ${head}.`);
            }

            core.setOutput('pull_request_number', String(pr.number));
            core.setOutput('pull_request_url', pr.html_url);
            core.setOutput('pull_request_head_ref', pr.head.ref);
            core.setOutput('pull_request_body', pr.body || '');

      - name: Dispatch pull request verification
        if: steps.resolve_pr.outputs.pull_request_number != ''
        uses: actions/github-script@v9
        env:
          PULL_REQUEST_NUMBER: ${{ steps.resolve_pr.outputs.pull_request_number }}
          PULL_REQUEST_URL: ${{ steps.resolve_pr.outputs.pull_request_url }}
          PULL_REQUEST_HEAD_REF: ${{ steps.resolve_pr.outputs.pull_request_head_ref }}
          PULL_REQUEST_BODY: ${{ steps.resolve_pr.outputs.pull_request_body }}
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              ...context.repo,
              event_type: 'verify-aircraft-submission-pr',
              client_payload: {
                pull_request_number: Number(process.env.PULL_REQUEST_NUMBER),
                pull_request_url: process.env.PULL_REQUEST_URL,
                pull_request_head_ref: process.env.PULL_REQUEST_HEAD_REF,
                pull_request_body: process.env.PULL_REQUEST_BODY,
              },
            });

      - name: Comment with pull request link
        if: steps.process_issue.outputs.change_action != 'no-change' && steps.resolve_pr.outputs.pull_request_url != ''
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.resolve_pr.outputs.pull_request_url }}
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const prUrl = process.env.PR_URL;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `A pull request has been prepared to update \`assets/aircraft_weights.csv\`: ${prUrl}`
            });
