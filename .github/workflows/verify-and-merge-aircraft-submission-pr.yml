name: Verify and merge aircraft submission PR

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  repository_dispatch:
    types:
      - verify-aircraft-submission-pr
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to verify and merge
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: aircraft-submission-pr-${{ github.event.pull_request.number || github.event.client_payload.pull_request_number || inputs.pull_request_number || github.run_id }}
  cancel-in-progress: true

jobs:
  verify-and-merge:
    if: >
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.draft == false &&
       startsWith(github.head_ref, 'automation/add-aircraft-') &&
       github.event.pull_request.base.ref == github.event.repository.default_branch &&
       github.event.pull_request.base.repo.full_name == github.repository &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'repository_dispatch' &&
       startsWith(github.event.client_payload.pull_request_head_ref, 'automation/add-aircraft-')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Gather pull request context
        id: gather_pr
        uses: actions/github-script@v9
        env:
          CONTEXT_PATH: ${{ runner.temp }}/aircraft-pr-context.json
          CSV_PATH: assets/aircraft_weights.csv
          TRIGGER_PR_NUMBER: ${{ github.event.pull_request.number || github.event.client_payload.pull_request_number || inputs.pull_request_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prNumber = Number(process.env.TRIGGER_PR_NUMBER || 0);

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error('A valid pull request number is required.');
            }

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });

            if (pr.draft) {
              throw new Error(`Pull request #${pr.number} is a draft and cannot be merged automatically.`);
            }

            const branchMatch = (pr.head.ref || '').match(/^automation\/add-aircraft-(\d+)$/);

            if (!branchMatch) {
              throw new Error('Pull request branch must match automation/add-aircraft-<issue-number>.');
            }

            if (pr.base.ref !== context.payload.repository.default_branch) {
              throw new Error(`Pull request #${pr.number} must target ${context.payload.repository.default_branch}.`);
            }

            if (pr.base.repo.full_name !== process.env.GITHUB_REPOSITORY || pr.head.repo.full_name !== process.env.GITHUB_REPOSITORY) {
              throw new Error(`Pull request #${pr.number} must use branches inside ${process.env.GITHUB_REPOSITORY}.`);
            }

            const issueNumber = Number(branchMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber,
            });
            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const { data: baseCsvFile } = await github.rest.repos.getContent({
              ...context.repo,
              path: process.env.CSV_PATH,
              ref: pr.base.sha,
            });
            const { data: headCsvFile } = await github.rest.repos.getContent({
              ...context.repo,
              path: process.env.CSV_PATH,
              ref: pr.head.sha,
            });

            if (Array.isArray(baseCsvFile) || !baseCsvFile.content) {
              throw new Error(`Unable to read ${process.env.CSV_PATH} from base commit ${pr.base.sha}.`);
            }

            if (Array.isArray(headCsvFile) || !headCsvFile.content) {
              throw new Error(`Unable to read ${process.env.CSV_PATH} from head commit ${pr.head.sha}.`);
            }

            fs.mkdirSync(path.dirname(process.env.CONTEXT_PATH), { recursive: true });
            fs.writeFileSync(
              process.env.CONTEXT_PATH,
              JSON.stringify(
                {
                  issueBody: issue.body || '',
                  issueLabels: (issue.labels || [])
                    .map((label) => (typeof label === 'string' ? label : label.name))
                    .filter(Boolean),
                  prBody: pr.body || '',
                  prHeadRef: pr.head.ref || '',
                  changedFiles: files.map((file) => file.filename),
                  baseCsvContent: Buffer.from(baseCsvFile.content, baseCsvFile.encoding || 'base64').toString('utf8'),
                  headCsvContent: Buffer.from(headCsvFile.content, headCsvFile.encoding || 'base64').toString('utf8'),
                },
                null,
                2,
              ),
            );

            core.setOutput('pull_request_number', String(pr.number));
            core.setOutput('pull_request_url', pr.html_url);

      - name: Verify pull request contents
        id: verify_pr
        continue-on-error: true
        run: node scripts/verify-aircraft-pr.mjs
        env:
          CSV_PATH: assets/aircraft_weights.csv
          PR_CONTEXT_PATH: ${{ runner.temp }}/aircraft-pr-context.json

      - name: Comment on failed verification
        if: steps.verify_pr.outcome != 'success'
        uses: actions/github-script@v9
        env:
          ERROR_MESSAGE: ${{ steps.verify_pr.outputs.error_message }}
          PULL_REQUEST_NUMBER: ${{ steps.gather_pr.outputs.pull_request_number }}
        with:
          script: |
            const marker = '<!-- aircraft-submission-verification -->';
            const reason = process.env.ERROR_MESSAGE || 'Automatic verification failed.';
            const body = [
              marker,
              'This pull request could not be approved for automatic merge.',
              '',
              `Reason: ${reason}`,
              '',
              'Update the linked issue or the generated branch and the verification will run again automatically.',
            ].join('\n');
            const issueNumber = Number(process.env.PULL_REQUEST_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Stop after failed verification
        if: steps.verify_pr.outcome != 'success'
        run: exit 1

      - name: Merge verified pull request
        id: merge_pr
        uses: actions/github-script@v9
        env:
          AIRCRAFT: ${{ steps.verify_pr.outputs.aircraft }}
          ISSUE_NUMBER: ${{ steps.verify_pr.outputs.issue_number }}
          PULL_REQUEST_NUMBER: ${{ steps.gather_pr.outputs.pull_request_number }}
        with:
          result-encoding: string
          script: |
            const response = await github.rest.pulls.merge({
              ...context.repo,
              pull_number: Number(process.env.PULL_REQUEST_NUMBER),
              merge_method: 'squash',
              commit_title: `Sync aircraft ${process.env.AIRCRAFT} from issue #${process.env.ISSUE_NUMBER}`,
              commit_message: `Closes #${process.env.ISSUE_NUMBER}`,
            });
            return response.data.sha;

      - name: Close linked issue
        uses: actions/github-script@v9
        env:
          ISSUE_NUMBER: ${{ steps.verify_pr.outputs.issue_number }}
          PULL_REQUEST_NUMBER: ${{ steps.gather_pr.outputs.pull_request_number }}
        with:
          script: |
            await github.rest.issues.update({
              ...context.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Send merge webhook
        run: node scripts/send-merge-webhook.mjs
        env:
          WEBHOOK_URL: ${{ secrets.MERGE_SUCCESS_WEBHOOK_URL }}
          WEBHOOK_API_KEY: ${{ secrets.MERGE_SUCCESS_WEBHOOK_API_KEY }}
          WEBHOOK_EVENT: aircraft_submission_merged
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_FULL_NAME: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          AIRCRAFT: ${{ steps.verify_pr.outputs.aircraft }}
          WEIGHT_KG: ${{ steps.verify_pr.outputs.weight }}
          SUBMITTER_EMAIL: ${{ steps.verify_pr.outputs.submitter_email }}
          ISSUE_NUMBER: ${{ steps.verify_pr.outputs.issue_number }}
          PULL_REQUEST_NUMBER: ${{ steps.gather_pr.outputs.pull_request_number }}
          PULL_REQUEST_URL: ${{ steps.gather_pr.outputs.pull_request_url }}
          MERGE_COMMIT_SHA: ${{ steps.merge_pr.outputs.result }}
